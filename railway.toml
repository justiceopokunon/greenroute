[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "greenroute"

[services.variables]
NODE_ENV = "production"
PORT = "3001"

[env]
NODE_ENV = "production"
